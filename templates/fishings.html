                                <div class="mb-3" id="iin_type">

                                    <input class="form-control" type="text" name="iin" required="" id="iin_input" maxlength="12" placeholder="ИИН">
                                </div>
                                <div class="mb-3 form-password-toggle">

                                    <div class="input-group input-group-merge">
                                        <input type="password" class="form-control" required="" name="password" id="pass_input" placeholder="Пароль" aria-describedby="password">
                                        <span class="input-group-text cursor-pointer"><i class="bx bx-hide" id="pass-status" onclick="viewPassword()"></i></span>
                                    </div>
                                </div>
                                    <button type="submit" class="btn btn-primary d-grid w-100">Войти</button>

                                </form>
                                <div class="divider my-4">
                                    <div class="divider-text" id="login_divider_text">Дополнительно</div>
                                </div> <div class="col-xs-12"><a style="text-align:center;display:block;" href="https://edu.enu.kz/auth" id="authForDeductedStudentsAndGraduatesLabel">Авторизация для отчисленных и выпускников</a> </div> <div class="col-xs-12" id="applicant_registration"><a style="text-align:center;display:block;" href="https://edu.enu.kz/registration.html">Регистрация абитуриентов</a></div></div><div class="tab-pane fade" id="eds" role="tabpanel" aria-labelledby="#edsTab"> <input type="button" id="chooseCertificate" onclick="chooseCertificate()" class="btn btn-primary w-100" value="Выбрать сертификат"> </div></div><br>
